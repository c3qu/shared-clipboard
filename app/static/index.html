<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="appTitle">共享剪贴板</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 data-i18n="appTitle">共享剪贴板</h1>
            <button id="langToggle" class="lang-toggle">EN / 中文</button>
            <button id="clearBtn" class="btn-danger" data-i18n="clearAll">🗑️ 清空全部</button>
        </header>
        <div class="input-section">
            <textarea id="contentInput" data-i18n-placeholder="contentPlaceholder" placeholder="在此输入或粘贴内容，按 Ctrl+Enter 提交..." rows="3"></textarea>
            <div class="input-actions">
                <button id="pasteBtn" class="btn-secondary" data-i18n="pasteButton">📋 从剪贴板粘贴</button>
                <label class="btn-secondary file-label">
                    <span data-i18n="uploadFile">📎 上传文件</span>
                    <input type="file" id="fileInput" style="display: none">
                </label>
                <button id="submitBtn" class="btn-primary" data-i18n="addButton">添加</button>
            </div>
            <div id="uploadProgress" class="upload-progress" style="display: none">
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
                <span class="progress-text" data-i18n="uploading">上传中...</span>
            </div>
        </div>
        <main>
            <div id="itemsList" class="items-list">
                <div class="loading" data-i18n="loading">加载中...</div>
            </div>
        </main>
        <div id="toast" class="toast" data-i18n="copied">已复制到剪贴板</div>
    </div>
    <script src="/static/i18n.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
